<label [ngClass]="{'error': control && control.errors}">
  <span>{{label}}</span>
  <input type="textbox"
         placeholder="{{placeholder}}"
         [value]="_value"
         (input)="onChange($event.target.value)"
         (keyup)="onChange($event.target.value)">

  <validation-messages controlName="{{formControlName}}" [control]="control" label="{{label}}" [validationMessages]="validationMessages"></validation-messages>
</label>
