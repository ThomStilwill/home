<h3>Edit</h3>

<form [formGroup]="logform" (submit)="submit(logform)">
  <input-text formControlName="mileage" label="Mileage" [validationMessages]="validationMessages"></input-text>
  <input-text formControlName="event" label="Event" [validationMessages]="validationMessages"></input-text>
  <input-text formControlName="note" label="Note" [validationMessages]="validationMessages"></input-text>

  <br/>
  <div class="btn-group">
    <button type="button" (click)="cancel()">Cancel</button>
    <button type="submit" >Save</button>
  </div>
</form>

<br/>
<pre>{{logform.value | json}}</pre>
